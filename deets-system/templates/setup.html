<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started — Deets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            border: 1px solid #e1e8ed;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .checkbox-group {
            display: grid;
            gap: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .checkbox-item:hover {
            background: #f7f9fa;
            border-color: #1d9bf0;
        }
        
        .checkbox-item input {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #1d9bf0;
        }
        
        .checkbox-item label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }
        
        button {
            width: 100%;
            background: #1d9bf0;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(29, 155, 240, 0.3);
            margin-top: 24px;
        }
        
        button:hover {
            background: #1a91da;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        
        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Welcome!</h1>
        <p class="subtitle">Just 3 things to get started (takes 1 minute)</p>
        
        <form id="setupForm">
            <!-- Name -->
            <div class="form-group">
                <label for="name">Your name (optional)</label>
                <input type="text" id="name" name="name" placeholder="e.g., Chris">
                <div class="help-text">Helps others know who's dropping deets</div>
            </div>
            
            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone <span class="required">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
                <div class="help-text">For passing deets via SMS. We'll never spam you.</div>
            </div>
            
            <!-- Topics -->
            <div class="form-group">
                <label>Pick 1-3 topics you care about <span class="required">*</span></label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="topic1" name="topics" value="Celebrity/Entertainment">
                        <label for="topic1">🎬 Celebrity & Entertainment</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="topic2" name="topics" value="Sports">
                        <label for="topic2">⚽ Sports</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="topic3" name="topics" value="Tech Breakthroughs">
                        <label for="topic3">💻 Tech Breakthroughs</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="topic4" name="topics" value="True Crime">
                        <label for="topic4">🔍 True Crime</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="topic5" name="topics" value="Crypto/Finance">
                        <label for="topic5">💰 Crypto & Finance</label>
                    </div>
                </div>
                <div class="help-text">You can change these anytime</div>
            </div>
            
            <button type="submit">Let's Go! →</button>
            <div id="message" style="margin-top: 16px;"></div>
        </form>
    </div>
    
    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const name = document.getElementById('name').value || 'Friend';
            const topics = Array.from(document.querySelectorAll('input[name="topics"]:checked'))
                .map(el => el.value);
            
            if (topics.length === 0) {
                document.getElementById('message').innerHTML = '<div style="color: #e74c3c; font-size: 14px;">Pick at least one topic</div>';
                return;
            }
            
            try {
                const response = await fetch('/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phone,
                        name: name,
                        topics: topics,
                        notifyMethod: 'both'
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    window.location.href = `/dashboard/${result.user_id}`;
                } else {
                    document.getElementById('message').innerHTML = `<div style="color: #e74c3c; font-size: 14px;">Error: ${result.error}</div>`;
                }
            } catch (err) {
                document.getElementById('message').innerHTML = `<div style="color: #e74c3c; font-size: 14px;">Error: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
